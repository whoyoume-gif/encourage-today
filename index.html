<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>今日の自分を励ますアプリ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="message-panel" aria-labelledby="app-title">
        <p class="eyebrow">Today</p>
        <h1 id="app-title">今日の自分を励ますアプリ</h1>
        <p id="message" class="message" aria-live="polite">
          ボタンを押すと、今のあなたに向けた応援メッセージが出ます。
        </p>
        <button id="encourageButton" class="encourage-button" type="button">
          応援メッセージをもらう
        </button>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
